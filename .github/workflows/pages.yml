name: Deploy web preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          set -e
          mkdir -p _site
          # shared renderer assets (source of truth: src/renderer/)
          cp src/renderer/player.js _site/
          cp src/renderer/library.js _site/
          cp src/renderer/recording.js _site/
          cp src/renderer/app.js _site/
          cp src/renderer/styles.css _site/
          # web-specific: HTML, mock api, override CSS, sample audio
          cp web/index.html _site/
          cp web/mock-api.js _site/
          cp web/web.css _site/
          cp web/.nojekyll _site/
          cp -R web/samples _site/samples
          ls -la _site _site/samples

      - uses: actions/configure-pages@v4
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
