name: Build macOS app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build mac dmg + zip (x64 + arm64, unsigned)
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-audio-recorder-mac
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

      - name: Create release with dmg + zip assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}-$(echo ${{ github.sha }} | cut -c1-7)"
          gh release create "$TAG" \
            --title "Build #${{ github.run_number }}" \
            --notes "Auto-built unsigned macOS .dmg + .zip from commit ${{ github.sha }}.

          ## ⚠️ Install instructions (read first!)

          This build is **unsigned**. macOS Sonoma/Sequoia will show *\"Electron Audio Recorder.app is damaged and can't be opened\"* and refuse to launch it. Right-click → Open no longer bypasses this on Sequoia.

          **Before installing**, open Terminal and run:

          \`\`\`
          xattr -d com.apple.quarantine ~/Downloads/Electron.Audio.Recorder-1.0.0-arm64.dmg
          \`\`\`

          (or use the x64 filename for Intel Macs.) Then double-click the .dmg, drag the app into Applications, and open it normally.

          If you already copied the app to /Applications and saw the error, run instead:

          \`\`\`
          xattr -cr \"/Applications/Electron Audio Recorder.app\"
          \`\`\`" \
            dist/*.dmg dist/*.zip
