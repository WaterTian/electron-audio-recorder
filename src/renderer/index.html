<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; media-src 'self' rec: blob:; img-src 'self' data:; style-src 'self' 'unsafe-inline';" />
    <title>Electron Audio Recorder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="titlebar">
      <div class="brand">Audio Recorder</div>
      <nav class="tabs" role="tablist">
        <button class="tab" data-route="recording" role="tab" aria-selected="true">Recording</button>
        <button class="tab" data-route="library" role="tab" aria-selected="false">Library</button>
      </nav>
    </header>

    <main id="view" class="view"></main>

    <template id="tpl-recording">
      <section class="page page-recording">
        <div class="recorder-card">
          <div class="status">
            <span class="dot" data-state="idle" aria-hidden="true"></span>
            <span class="status-text">Idle</span>
          </div>
          <div class="timer" aria-live="polite">00:00</div>
          <button class="record-btn" type="button">Start Recording</button>
          <p class="hint">
            On macOS, you'll be prompted to share your screen. Be sure to enable
            <strong>"Share audio"</strong> in the dialog &mdash; system audio is only
            available when sharing the entire screen.
          </p>
          <p class="error" hidden></p>
        </div>
      </section>
    </template>

    <template id="tpl-library">
      <section class="page page-library">
        <div class="library-header">
          <h2>Recordings</h2>
          <button class="refresh-btn" type="button" title="Refresh">Refresh</button>
        </div>
        <div class="library-body">
          <ul class="recording-list" aria-label="Recordings"></ul>
          <div class="empty-state" hidden>
            No recordings yet &mdash; start one on the Recording tab.
          </div>
        </div>
        <aside class="player-pane" hidden>
          <div class="player-header">
            <div class="player-title"></div>
            <button class="close-player" type="button" aria-label="Close player">x</button>
          </div>
          <audio class="player" controls preload="metadata"></audio>
          <div class="player-meta"></div>
        </aside>
      </section>
    </template>

    <script src="recording.js"></script>
    <script src="library.js"></script>
    <script src="app.js"></script>
  </body>
</html>
