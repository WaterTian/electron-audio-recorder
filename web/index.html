<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Electron Audio Recorder — web preview (UI demo, no recording)" />
    <title>Audio Recorder — Web Demo</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="web.css" />
  </head>
  <body>
    <header class="titlebar">
      <div class="brand">Audio Recorder</div>
      <nav class="tabs" role="tablist">
        <button class="tab" data-route="recording" role="tab" aria-selected="true">Recording</button>
        <button class="tab" data-route="library" role="tab" aria-selected="false">Library</button>
      </nav>
      <a class="web-badge" href="https://github.com/WaterTian/electron-audio-recorder/releases/latest" target="_blank" rel="noreferrer">Web Demo · Get Mac app ↗</a>
    </header>

    <main id="view" class="view"></main>

    <footer id="player-bar" class="player-bar" hidden>
      <div class="pb-track">
        <div class="pb-art"><div class="pb-art-glyph"></div></div>
        <div class="pb-info">
          <div class="pb-title"></div>
          <div class="pb-meta"></div>
        </div>
      </div>
      <div class="pb-controls">
        <button class="pb-icon pb-prev" type="button" aria-label="Previous">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 6h2v12H6zM9.5 12l8.5 6V6z"/></svg>
        </button>
        <button class="pb-play" type="button" data-state="paused" aria-label="Play">
          <svg class="pb-play-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
          <svg class="pb-pause-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <button class="pb-icon pb-next" type="button" aria-label="Next">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 6v12l8.5-6L6 6zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
      <div class="pb-progress">
        <span class="pb-elapsed">0:00</span>
        <div class="pb-scrub"><div class="pb-scrub-fill"></div></div>
        <span class="pb-total">0:00</span>
      </div>
      <div class="pb-volume">
        <span class="pb-vol-icon" data-muted="false">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06A7 7 0 0 1 14 18.71v2.06A9 9 0 0 0 14 3.23z"/></svg>
        </span>
        <div class="pb-vol"><div class="pb-vol-fill"></div></div>
      </div>
      <audio preload="metadata"></audio>
    </footer>

    <template id="tpl-recording">
      <section class="page page-recording">
        <div class="recorder-card">
          <div class="status">
            <span class="dot" data-state="idle" aria-hidden="true"></span>
            <span class="status-text">Idle</span>
          </div>
          <div class="timer" aria-live="polite">00:00</div>
          <button class="record-btn" type="button">Start Recording</button>
          <p class="hint">
            Web demo &mdash; recording is disabled here. Install the Mac app to capture system audio
            (loopback). Click <strong>Library</strong> to preview the player.
          </p>
          <p class="error" hidden></p>
        </div>
      </section>
    </template>

    <template id="tpl-library">
      <section class="page page-library">
        <div class="library-header">
          <h2>Recordings</h2>
          <button class="refresh-btn" type="button" title="Refresh">Refresh</button>
        </div>
        <div class="library-body">
          <ul class="recording-list" aria-label="Recordings"></ul>
          <div class="empty-state" hidden>
            <div class="empty-state-glyph">♪</div>
            <div class="empty-state-text">No recordings yet</div>
            <div class="empty-state-sub">Head to the Recording tab to capture system audio.</div>
          </div>
        </div>
      </section>
    </template>

    <script src="player.js"></script>
    <script src="recording.js"></script>
    <script src="library.js"></script>
    <script src="mock-api.js"></script>
    <script src="app.js"></script>
  </body>
</html>
